<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forgot password</title>
    <link rel="stylesheet" href="forgetpassword.css">
</head>
<body>
    <div id="first">
       <img src="download (1).jpeg" alt="" id="img">
    <div id="second">

    <h1>Forgot password</h1>
    <p id="p1">Enter your valid login credentials to reset your passord.</p>
    <form action="" method="post" onclick="return formvalid()">
    <label for="" id="how">How are you related to the school: </label>
    <select name="" id="select">
        <option value="identity">identity</option>
    <option value="I am a student">I am a student</option>
    <option value="I am a spillover">I am a spillover</option>
    
    </select>
   
    <label for="" id="matric">Matric number:</label>
    <input type="text" placeholder="Enter your matric number" required id="matricno" maxlength="9">
    <label for="" id="pin">Reset pin:</label>
    <input type="text" placeholder="Enter your pin" required maxlength="4" id="pins">
    <label for="" id="passa">New Password:</label>
    <input type="password" id="passworda" placeholder="Enter your password" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\w_]).{8}$"
    title="password must be exactly 8 characters and include uppercase,number,and special characters" maxlength="8" oninput="return myform()">
    <label for="" id="passb">confirm Password:</label>
    <input type="password" id="passwordb" placeholder="Confirm your password" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\w_]).{8}$"
    title="password must be exactly 8 characters and include uppercase,number,and special characters" maxlength="8" oninput="return myform()">
    <span id="span"></span>
    <button type="submit" id="contd" >Continue</button>
    <p id="p2">Remember password <a href="login.html" id="p3">Login</a></p>
    </form>
    </div>
    <div id="third">
   <p id="pea">2026 Adekunle Ajasin University, Akungba Akoko.</p>
    </div>
     </div>

</body>
